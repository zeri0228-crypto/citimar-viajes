<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#027fb9">
<title>Citimar Travel App Premium</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>

:root{
  /* CITIMAR BRAND PALETTE */
  --brand-sky:#7dbbe5;
  --brand-red:#d11223;
  --brand-orange:#d86919;
  --brand-blue:#027fb9;
  --brand-gold:#eeb405;

  /* SEMANTIC COLOR SYSTEM */
  --primary:var(--brand-blue);
  --primary-soft:#e7f5fd;
  --primary-dark:#015f8f;

  --accent:var(--brand-orange);
  --accent-soft:#fff1e8;
  --accent-dark:#a94f10;

  --premium:var(--brand-gold);
  --premium-soft:#fff7d6;
  --premium-dark:#ad8000;

  --danger:var(--brand-red);
  --danger-soft:#fdecee;
  --danger-dark:#970c18;

  --info:var(--brand-sky);
  --info-soft:#eef8ff;
  --success:#168a45;
  --success-soft:#e9f8ef;
  --wa:#25d366;

  /* UI NEUTRALS */
  --bg:#f5f8fc;
  --bg-elevated:#ffffff;
  --card:#ffffff;
  --ink:#102033;
  --ink-2:#26384d;
  --muted:#687386;
  --line:#e3ebf3;

  /* GRADIENTS */
  --grad-brand:linear-gradient(135deg,var(--primary),var(--info) 55%,var(--primary-dark));
  --grad-premium:linear-gradient(135deg,var(--accent),var(--premium));
  --grad-soft:linear-gradient(135deg,rgba(125,187,229,.22),rgba(238,180,5,.16));
  --grad-danger:linear-gradient(135deg,var(--danger),var(--accent));

  /* LEGACY ALIASES - do not remove */
  --blue:var(--primary);
  --blue2:var(--info);
  --gold:var(--premium);
  --red:var(--danger);
  --green:var(--success);

  --shadow:0 16px 38px rgba(16,32,51,.10);
  --shadow2:0 8px 20px rgba(16,32,51,.08);
  --r:22px;
  --font:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif
}

body.dark{
  --bg:#08111d;
  --bg-elevated:#0f1b2b;
  --card:#121d2c;
  --ink:#eef6ff;
  --ink-2:#d9e8f5;
  --muted:#9fb0c6;
  --line:#263449;

  --primary-soft:#0e3046;
  --accent-soft:#342014;
  --premium-soft:#332b0d;
  --danger-soft:#351217;
  --info-soft:#102b3d;
  --success-soft:#10351f;

  --shadow:0 18px 45px rgba(0,0,0,.35);
  --shadow2:0 8px 22px rgba(0,0,0,.28)
}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}
body{font-family:var(--font);background:#09111d;color:var(--ink)}
button,a,input,select,textarea{font:inherit}button,a{touch-action:manipulation}
.app{height:100dvh;display:grid;grid-template-columns:280px 1fr;background:var(--bg)}
.sidebar{background:linear-gradient(180deg,var(--primary-dark),#08111d);padding:18px;color:#fff;display:flex;flex-direction:column;gap:16px}
.brand{background:rgba(255,255,255,.96);border-radius:18px;padding:12px;color:#102033}
.brand-mark{display:flex;align-items:center;gap:12px}
.logo-dot{width:54px;height:54px;border-radius:16px;background:var(--grad-premium);display:grid;place-items:center;color:#fff;font-weight:950;font-size:22px;box-shadow:0 10px 25px rgba(2,127,185,.22)}
.brand h1{font-size:17px;line-height:1;margin:0;font-weight:950}.brand p{font-size:11px;margin:2px 0 0;color:#687386}
.nav{display:flex;flex-direction:column;gap:7px;overflow:auto}.nav button,.bottom button{border:0;cursor:pointer}
.nav button{border-radius:15px;background:transparent;color:rgba(255,255,255,.68);padding:12px 14px;text-align:left;font-weight:850;display:flex;gap:10px;align-items:center}
.nav button.active,.nav button:hover{background:rgba(125,187,229,.18);color:#fff}.wa{margin-top:auto;background:var(--wa);color:#fff;border:0;border-radius:17px;padding:13px;font-weight:950;cursor:pointer}
.main{height:100dvh;display:flex;flex-direction:column;overflow:hidden}.top{height:68px;display:flex;justify-content:space-between;align-items:center;padding:12px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.72);backdrop-filter:blur(16px)}
body.dark .top{background:rgba(18,29,44,.76)}.top span{display:block;font-size:12px;color:var(--muted);margin-top:2px}
.icon{border:1px solid var(--line);background:var(--card);color:var(--ink);width:42px;height:42px;border-radius:14px;cursor:pointer;box-shadow:var(--shadow2)}
.view{display:none;overflow:auto;padding:22px}.view.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hero{position:relative;overflow:hidden;border-radius:30px;padding:24px;background:var(--grad-brand);color:#fff;box-shadow:var(--shadow);margin-bottom:16px}
.hero:after{content:"";position:absolute;right:-80px;bottom:-130px;width:340px;height:340px;border-radius:50%;background:rgba(238,180,5,.30)}
.hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.35fr .8fr;gap:18px}.hero-logo{display:flex;align-items:center;gap:10px;width:max-content;max-width:100%;background:#fff;color:#102033;border-radius:20px;padding:10px 14px;margin-bottom:14px;font-weight:950}
.hero-logo .logo-dot{width:38px;height:38px;border-radius:12px;font-size:16px}.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.78);font-weight:950}.hero h1{font-size:42px;line-height:1;margin:8px 0}.hero p{color:rgba(255,255,255,.78);margin:0}
.boarding{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.13);backdrop-filter:blur(12px);border-radius:24px;padding:18px}.boarding-row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed rgba(255,255,255,.32);padding:12px 0}.boarding-row:last-child{border:0}.code{font-size:28px;font-weight:950}.count{font-size:18px;font-weight:950}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:15px}.quick button,.primary,.secondary{border:0;border-radius:16px;padding:12px 14px;font-weight:950;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.quick button{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.18)}.primary{background:var(--accent);color:#fff}.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.section-title{display:flex;align-items:end;justify-content:space-between;margin:6px 0 14px;gap:12px}.section-title h2{margin:0;font-size:24px}.muted{color:var(--muted);font-size:13px}.card,.row,.bag-cat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow2);padding:16px;margin-bottom:12px}.row{display:flex;justify-content:space-between;align-items:center;gap:12px}.row h3,.card h3{margin:0 0 4px}.actions{display:flex;flex-wrap:wrap;gap:8px}.status{font-size:12px;font-weight:900;padding:6px 10px;border-radius:999px}.ok{background:var(--success-soft);color:var(--success)}.pending{background:var(--premium-soft);color:var(--premium-dark)}.urgent{background:var(--danger-soft);color:var(--danger)}
.timeline{display:grid;gap:12px}.step{display:grid;grid-template-columns:48px 1fr;gap:12px}.dot{width:42px;height:42px;border-radius:16px;background:var(--grad-premium);display:grid;place-items:center;color:#fff;font-weight:950}.notice{border-left:4px solid var(--premium);background:var(--card);padding:14px;border-radius:16px;box-shadow:var(--shadow2);margin-bottom:12px}
.route-map{position:relative;min-height:390px;border-radius:var(--r);overflow:hidden;background:linear-gradient(135deg,#dff5ff,#fff);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:14px}.route-map.real{background:var(--card)}#flightLiveMap{position:absolute;inset:0;width:100%;height:100%;z-index:1}.leaflet-container{font-family:var(--font);background:#dff5ff}.route-panel{position:absolute;left:16px;right:16px;top:16px;z-index:402;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:13px 14px;box-shadow:var(--shadow2);backdrop-filter:blur(14px);display:flex;justify-content:space-between;gap:12px}.dark .route-panel{background:rgba(18,29,44,.88);border-color:rgba(255,255,255,.08)}.route-panel h3{margin:0}.route-actions{position:absolute;left:16px;right:16px;bottom:14px;z-index:402;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.chip{font-size:12px;font-weight:950;padding:6px 10px;border-radius:999px;background:rgba(22,138,69,.1);color:var(--green);white-space:nowrap}.vehicle-live{width:38px;height:38px;display:grid;place-items:center;font-size:29px;transform:translate(-50%,-50%);filter:drop-shadow(0 8px 10px rgba(0,0,0,.35));animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.08)}}.map-label{background:rgba(255,255,255,.95);border:1px solid var(--line);color:#102033;padding:6px 9px;border-radius:999px;font-weight:950;font-size:11px;box-shadow:0 8px 20px rgba(16,32,51,.18)}.dark .map-label{background:rgba(18,29,44,.92);color:#eef6ff}.fallback-map{position:absolute;inset:0;display:grid;place-items:center;padding:18px;text-align:center;color:var(--muted);font-weight:850;background:radial-gradient(circle at 18% 24%,rgba(2,127,185,.25),transparent 25%),radial-gradient(circle at 82% 68%,rgba(216,105,25,.24),transparent 26%),linear-gradient(135deg,#dff5ff,#fff0dc)}
.bag-layout{display:grid;grid-template-columns:320px 1fr;gap:14px;align-items:start}.bag-panel{position:sticky;top:0}.bag-help{background:var(--primary-soft);border:1px solid rgba(2,127,185,.18);border-radius:16px;padding:12px;margin-bottom:12px}.bag-controls{display:grid;gap:10px;margin-bottom:12px}.bag-summary{display:grid;gap:10px}.bag-stat{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;border-radius:14px;background:var(--primary-soft);border:1px solid rgba(2,127,185,.14);font-weight:850}.bag-cat-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.bag-cat h3{margin:0}.bag-chip,.place-chip{font-size:11px;font-weight:900;border-radius:999px;padding:5px 8px;background:rgba(104,115,134,.10);color:var(--muted)}.place-chip{display:inline-flex;margin-top:6px;background:rgba(2,127,185,.10);color:var(--blue)}.bag-row{display:block;padding:8px 0;border-bottom:1px solid rgba(104,115,134,.12);line-height:1.4}.bag-row:last-child{border-bottom:0}.bag-row input{accent-color:var(--blue);margin-right:8px;width:auto}.bag-row small{display:block;color:var(--muted);font-size:11px;margin-left:25px}.bag-advice{border-left:4px solid var(--premium);background:linear-gradient(135deg,rgba(216,105,25,.10),rgba(2,127,185,.06));border-radius:16px;padding:13px;margin-bottom:12px}
.stars{font-size:34px;letter-spacing:4px;cursor:pointer;color:#d9dee7}.stars .on{color:var(--premium)}textarea,select,input{width:100%;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:14px;padding:12px}textarea{min-height:92px}.privacy{display:flex;gap:8px;align-items:flex-start;font-size:12px;margin-top:10px;color:var(--muted);line-height:1.45}.privacy input{width:auto;accent-color:var(--blue);margin-top:2px}.privacy a{color:var(--blue);font-weight:950}.social-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.social-grid .disabled{opacity:.55;cursor:not-allowed}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:#102033;color:#fff;padding:12px 16px;border-radius:16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.22s;z-index:999}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.bottom{display:none}.mobile-only{display:none}
@media(max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:fixed;z-index:500;inset:0 auto 0 0;width:285px;transform:translateX(-102%);transition:.2s}.sidebar.open{transform:none}.mobile-only{display:block}.bottom{display:grid;grid-template-columns:repeat(5,1fr);height:64px;background:var(--card);border-top:1px solid var(--line)}.bottom button{background:var(--card);color:var(--muted);font-size:11px;font-weight:850}.bottom button.active{color:var(--blue)}.view{padding:14px 14px 84px}.hero-grid{grid-template-columns:1fr}.quick{grid-template-columns:repeat(2,1fr)}.bag-layout{grid-template-columns:1fr}.bag-panel{position:relative}.route-panel{position:relative;left:auto;right:auto;top:auto;margin:12px}.route-actions{position:relative;left:auto;right:auto;bottom:auto;margin:12px}.route-map{min-height:360px}.hero h1{font-size:33px}.social-grid{grid-template-columns:1fr 1fr}}

.agency-logo{max-width:150px;max-height:60px;object-fit:contain;display:block}
.hero-logo img{max-width:210px;max-height:72px;object-fit:contain;display:block}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.summary-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow2);padding:16px}
.summary-card b{display:block;font-size:18px;margin-top:4px}
.summary-card span{font-size:12px;color:var(--muted);font-weight:850}
.next-card{background:linear-gradient(135deg,rgba(2,127,185,.10),rgba(216,105,25,.10));border-left:4px solid var(--premium)}
.doc-mini{display:grid;gap:8px}
.doc-mini div{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding:7px 0;font-size:13px}
.doc-mini div:last-child{border-bottom:0}
@media(max-width:980px){.summary-grid{grid-template-columns:1fr 1fr}.agency-logo{max-width:135px}.hero-logo img{max-width:190px}}


/* === PREMIUM COLOR SYSTEM REFINEMENTS === */
.top{
  background:rgba(255,255,255,.78);
  border-bottom:1px solid var(--line);
}
body.dark .top{
  background:rgba(15,27,43,.82);
}
.brand{
  border:1px solid rgba(125,187,229,.28);
  box-shadow:0 12px 28px rgba(2,127,185,.12);
}
.logo-dot{
  background:var(--grad-premium);
}
.hero{
  background:var(--grad-brand);
}
.hero:after{
  background:radial-gradient(circle,rgba(238,180,5,.34),rgba(216,105,25,.18) 55%,transparent 70%);
}
.primary{
  background:var(--accent);
  color:#fff;
  box-shadow:0 8px 18px rgba(216,105,25,.18);
}
.primary:hover{
  background:var(--accent-dark);
}
.secondary{
  background:var(--card);
  color:var(--ink);
  border:1px solid var(--line);
}
.secondary:hover{
  border-color:var(--info);
  background:var(--info-soft);
}
.quick button:hover{
  background:rgba(255,255,255,.22);
  border-color:rgba(238,180,5,.55);
}
.card,.row,.bag-cat{
  background:var(--card);
}
.notice{
  border-left-color:var(--premium);
  background:linear-gradient(135deg,var(--card),var(--premium-soft));
}
.status.ok{
  background:var(--success-soft);
  color:var(--success);
}
.status.pending{
  background:var(--premium-soft);
  color:var(--premium-dark);
}
.status.urgent{
  background:var(--danger-soft);
  color:var(--danger);
}
.route-panel{
  border:1px solid rgba(125,187,229,.45);
}
.chip{
  background:var(--success-soft);
  color:var(--success);
}
.bag-advice{
  border-left-color:var(--accent);
  background:var(--grad-soft);
}
.place-chip{
  background:var(--info-soft);
  color:var(--primary);
}
.stars .on{
  color:var(--premium);
}
.social-grid .primary:first-child{
  background:#1877F2;
}
.social-grid .primary:nth-child(2){
  background:linear-gradient(135deg,#833AB4,#E1306C,#FCAF45);
}
.social-grid .primary:last-child{
  background:var(--wa);
}
.nav button.active,.nav button:hover{
  background:linear-gradient(135deg,rgba(2,127,185,.26),rgba(125,187,229,.14));
  border:1px solid rgba(125,187,229,.18);
}
.bottom button.active{
  color:var(--primary);
}
.icon:hover{
  border-color:var(--info);
  background:var(--info-soft);
}


/* FIX CONTRASTE BOARDING */
.boarding, .boarding *{
  text-shadow: 0 2px 6px rgba(0,0,0,0.45);
}



/* FIX LIMPIO: ETIQUETAS SIN SOMBRA */
.boarding .muted{
  color: rgba(255,255,255,0.95) !important;
  font-weight: 900 !important;
  letter-spacing: .04em;
  text-shadow: none !important;
}

.boarding .code,
.boarding .count{
  color: #ffffff !important;
  text-shadow: 0 2px 4px rgba(0,0,0,.25);
}


.boarding .boarding-row .muted{
  display: inline-block;
  margin-bottom: 4px;
}

.boarding .code,
.boarding .count{
  color: #ffffff !important;
  text-shadow: 0 3px 8px rgba(0,0,0,.55);
}

</style>
</head>

function wa(msg){window.open('https://wa.me/'+cfg.agency.phone+'?text='+encodeURIComponent(msg),'_blank')}
function openUrl(url,msg='Link pendiente por cargar.'){url?window.open(url,'_blank'):toast(msg)}
function fmt(d){try{return new Date(d+'T00:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'})}catch{return d}}
function days(){return Math.max(1,Math.ceil((new Date(trip.endDate+'T00:00:00')-new Date(trip.startDate+'T00:00:00'))/86400000)+1)}
function smart(){const now=new Date(),s=new Date(trip.startDate+'T00:00:00'),e=new Date(trip.endDate+'T23:59:59'),d=Math.ceil((s-now)/86400000);if(now>=s&&now<=e)return'Hoy estás de viaje';if(d===1)return'Tu vuelo sale mañana';if(d===0)return'Hoy inicia tu viaje';if(d>1)return`Faltan ${d} días`;return'Tu viaje ya finalizó'}
function short(x){x=String(x||'');return x.length<=5?x.toUpperCase():x.split(/[ ,/-]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()}
function renderNav(){const btn=n=>`<button data-view="${n[0]}" class="${current===n[0]?'active':''}"><span>${n[1]}</span>${n[2]}</button>`;$('#nav').innerHTML=nav.map(btn).join('');$('#bottom').innerHTML=nav.slice(0,5).map(n=>`<button data-view="${n[0]}" class="${current===n[0]?'active':''}"><div>${n[1]}</div>${n[2]}</button>`).join('')}
function go(v){current=v;document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));$('#topTitle').textContent=nav.find(n=>n[0]===v)?.[2]||'Citimar';renderNav();$('#sidebar').classList.remove('open');if(v==='flights')setTimeout(initFlightMap,150)}

<div class="muted" style="color:rgba(255,255,255,0.7)">${esc(trip.status)}</div><h1>${esc(smart())}</h1><p>${esc(trip.clientName)} · ${esc(trip.destination)} · ${fmt(trip.startDate)} al ${fmt(trip.endDate)}</p><div class="quick"><button data-view="flights">✈️ Ver ruta</button><button data-view="documents">📄 Documentos</button><button data-view="bag">🧳 Checklist</button><button data-view="emergency">🛟 Emergencia</button></div></div><div class="boarding"><div class="boarding-row"><div><span class="muted">Origen</span><div class="code">${esc(short(d.from||trip.origin))}</div></div><div style="text-align:right"><span class="muted">Destino</span><div class="code">${esc(short(d.to||trip.destination))}</div></div></div><div class="boarding-row"><div><span class="muted">Vuelo</span><div class="count">${esc(d.flightNumber)}</div></div><div style="text-align:right"><span class="muted">Fecha</span><div class="count">${fmt(d.date)}</div></div></div><div class="boarding-row"><div><span class="muted">Hotel</span><div class="count">${esc(trip.hotel.name)}</div></div></div></div></div></div><div class="section-title"><h2>Resumen general</h2><span class="muted">Lo importante de primer vistazo</span></div><div class="summary-grid"><div class="summary-card"><span>Días de viaje</span><b>${days()}</b></div><div class="summary-card"><span>Documentos listos</span><b>${docsOk}/${docsTotal}</b></div><div class="summary-card"><span>Tipo de traslado</span><b>${trip.transportType==='terrestre'?'Terrestre':'Aéreo'}</b></div><div class="summary-card"><span>Destino</span><b>${esc(trip.destination)}</b></div></div><div class="card next-card"><h3>Próximo evento</h3><p class="muted">Vuelo de ida · ${esc(d.flightNumber)} · ${fmt(d.date)} ${esc(d.time)} · ${esc(d.from)} → ${esc(d.to)}</p><div class="actions" style="margin-top:10px"><button class="primary" data-view="flights">Ver mapa y estado</button><button class="secondary" data-url="${esc(airlineStatusUrl(d.airline))}">Estado del vuelo</button></div></div><div class="card"><h3>Estado de documentos</h3><div class="doc-mini">${trip.documents.map(x=>`<div><span>${esc(x.title)}</span><strong class="${st(x.status)} status">${esc(x.status)}</strong></div>`).join('')}</div></div><div class="notice"><b>Recordatorios importantes</b><br>${trip.messages.map(m=>`<span class="muted">• ${esc(m)}</span>`).join('<br>')}</div>`}function renderTimeline(){const steps=[['Compra confirmada',trip.status],['Vuelo de ida',`${trip.flights.outbound.flightNumber} · ${fmt(trip.flights.outbound.date)}`],['Check-in hotel',`${trip.hotel.name} · ${trip.hotel.checkIn}`],['Tours','Actividades y vouchers'],['Vuelo regreso',`${trip.flights.return.flightNumber} · ${fmt(trip.flights.return.date)}`]];$('#timeline').innerHTML=`<div class="section-title"><h2>Timeline</h2></div><div class="timeline">${steps.map((s,i)=>`<div class="card step"><div class="dot">${i+1}</div><div><h3>${esc(s[0])}</h3><p class="muted">${esc(s[1])}</p></div></div>`).join('')}</div>`}
function st(s){s=(s||'').toLowerCase();return s.includes('disp')?'ok':s.includes('urg')?'urgent':'pending'}
function renderDocs(){const button=d=>d.url?`<button class="primary" data-url="${esc(d.url)}">Abrir PDF</button>`:`<button class="secondary" disabled>Pendiente</button>`;$('#documents').innerHTML=`<div class="section-title"><h2>Documentos</h2><button class="secondary" data-action="offline">⬇️ Guardar offline</button></div>${trip.documents.map(d=>`<div class="row"><div><h3>${esc(d.title)}</h3><span class="muted">${esc(d.type)}</span> <span class="status ${st(d.status)}">${esc(d.status)}</span></div>${button(d)}</div>`).join('')}<button class="primary" data-action="sendDocs">Enviar estado por WhatsApp</button>`}
function transport(){const m=(trip.transportType||'aereo').toLowerCase(),f=trip.flights.outbound;if(m.includes('terr'))return{ground:true,icon:'🚗',label:'Traslado terrestre en ruta',from:trip.origin,to:trip.destination,url:`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(trip.origin)}&destination=${encodeURIComponent(trip.destination)}&travelmode=driving`,live:'Google Maps'};let fn=(f.flightNumber||'').replace(/\s+/g,'');return{ground:false,icon:'✈️',label:'Ruta aérea en vivo',from:f.from||trip.origin,to:f.to||trip.destination,url:fn?`https://www.flightaware.com/live/flight/${encodeURIComponent(fn)}`:'https://www.flightaware.com/live/',live:'FlightAware'}}
function routeMap(){const r=transport();return `<div class="route-map real"><div id="flightLiveMap"></div><div class="route-panel"><div><h3>${r.icon} ${r.label}</h3><p class="muted">${esc(r.from)} → ${esc(r.to)} · track animado sobre mapa</p></div><span class="chip">Track activo</span></div><div class="route-actions"><button class="primary" data-url="${esc(r.url)}">Abrir ${r.live}</button><button class="secondary" data-view="transfers">Ver traslados</button><span class="muted">Si el mapa no carga, revisa internet.</span></div></div>`}
const coords={'MEX':[19.4363,-99.0721],'NLU':[19.7427,-99.0164],'CUN':[21.0365,-86.8771],'CDMX':[19.4326,-99.1332],'CIUDAD DE MEXICO':[19.4326,-99.1332],'CIUDAD DE MÉXICO':[19.4326,-99.1332],'CANCUN':[21.1619,-86.8515],'CANCÚN':[21.1619,-86.8515],'GDL':[20.5218,-103.3112],'MTY':[25.7785,-100.107],'TIJ':[32.5411,-116.9702],'GUADALAJARA':[20.6597,-103.3496],'MONTERREY':[25.6866,-100.3161],'TIJUANA':[32.5149,-117.0382],'PUERTO VALLARTA':[20.6534,-105.2253],'LOS CABOS':[22.8905,-109.9167],'ACAPULCO':[16.8531,-99.8237],'OAXACA':[17.0732,-96.7266],'TULUM':[20.2114,-87.4654],'CHIHUAHUA':[28.632,-106.0691],'DELICIAS':[28.1901,-105.4701]};
function coord(x,fb){const k=String(x||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return coords[k]||fb}
function routePts(a,b,g){a=coord(a,[19.4326,-99.1332]);b=coord(b,[21.1619,-86.8515]);return g?[a,[a[0]+(b[0]-a[0])*.35-.6,a[1]+(b[1]-a[1])*.35+.4],[a[0]+(b[0]-a[0])*.68+.4,a[1]+(b[1]-a[1])*.68-.3],b]:[a,[(a[0]+b[0])/2+.9,(a[1]+b[1])/2],b]}
function interp(p,t){let s=p.length-1,x=Math.min(s-.0001,Math.max(0,t*s)),i=Math.floor(x),f=x-i,a=p[i],b=p[i+1];return[a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f]}
function initFlightMap(){const el=$('#flightLiveMap');if(!el)return;if(typeof L==='undefined'){el.innerHTML='<div class="fallback-map">No se pudo cargar el mapa. Revisa conexión a internet.</div>';return}const r=transport(),pts=routePts(r.from,r.to,r.ground);if(animFrame)cancelAnimationFrame(animFrame);if(mapRef){mapRef.remove();mapRef=null}mapRef=L.map(el,{zoomControl:false,scrollWheelZoom:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(mapRef);L.control.zoom({position:'bottomright'}).addTo(mapRef);const line=L.polyline(pts,{color:'var(--accent)',weight:4,opacity:.95,dashArray:'10,10'}).addTo(mapRef);L.polyline(pts,{color:'#027fb9',weight:11,opacity:.18}).addTo(mapRef);L.marker(pts[0],{icon:L.divIcon({className:'',html:`<div class="map-label">${esc(short(r.from))}</div>`})}).addTo(mapRef);L.marker(pts.at(-1),{icon:L.divIcon({className:'',html:`<div class="map-label">${esc(short(r.to))}</div>`})}).addTo(mapRef);vehicleMarker=L.marker(pts[0],{icon:L.divIcon({className:'',html:`<div class="vehicle-live">${r.icon}</div>`,iconSize:[38,38]})}).addTo(mapRef);mapRef.fitBounds(line.getBounds(),{padding:[65,65]});setTimeout(()=>mapRef&&mapRef.invalidateSize(),250);const start=performance.now();(function step(now){vehicleMarker.setLatLng(interp(pts,((now-start)%9000)/9000));animFrame=requestAnimationFrame(step)})(start)}

function airlineStatusUrl(airline){
  const a=String(airline||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'');
  const links={
    volaris:'https://www.volaris.com/flight-status',
    aeromexico:'https://aeromexico.com/es-mx/estatus-de-vuelo',
    vivaaerobus:'https://www.vivaaerobus.com/es-mx/flight-status',
    viva:'https://www.vivaaerobus.com/es-mx/flight-status',
    american:'https://www.aa.com/travelInformation/flights/status',
    americanairlines:'https://www.aa.com/travelInformation/flights/status',
    united:'https://www.united.com/en/us/flightstatus',
    delta:'https://www.delta.com/flightstatus/search',
    lufthansa:'https://www.lufthansa.com/mx/es/flight-status',
    copa:'https://www.copaair.com/es-mx/estado-de-vuelo',
    copaairlines:'https://www.copaair.com/es-mx/estado-de-vuelo',
    iberia:'https://www.iberia.com/mx/gestion-de-reservas/estado-vuelos/',
    aircanada:'https://www.aircanada.com/mx/es/aco/home/fly/flight-information/flight-status-results.html',
    klm:'https://www.klm.com.mx/flight-status'
  };
  return links[a] || 'https://www.flightaware.com/live/';
}

function flightBlock(t,f){const statusUrl=f.statusUrl || '';return `<div class="row"><div><h3>${t}: ${esc(f.flightNumber)}</h3><p class="muted">${esc(f.airline)} · ${esc(f.from)} → ${esc(f.to)} · ${fmt(f.date)} ${esc(f.time)}</p></div><div class="actions"><button class="primary" data-url="${esc(statusUrl)}">Estado del vuelo</button><button class="secondary" data-url="https://www.flightaware.com/live/flight/${esc((f.flightNumber||'').replace(/\\s+/g,''))}">Mapa</button></div></div>`}
function renderFlights(){
if((trip.transportType||'aereo').toLowerCase().includes('terr')){
  $('#flights').innerHTML=`<div class="section-title"><h2>Vuelos</h2></div>
  <div class="notice"><b>No aplica vuelo</b><br><span class="muted">Este viaje es terrestre.</span></div>`;
}else{
  $('#flights').innerHTML=`<div class="section-title"><h2>Vuelos y ruta en vivo</h2><span class="muted">Mapa real + track animado</span></div>
  ${routeMap()}
  ${flightBlock('Ida',trip.flights.outbound)}
  ${flightBlock('Regreso',trip.flights.return)}`;
  setTimeout(initFlightMap,120);
}
}
function renderHotel(){$('#hotel').innerHTML=`<div class="section-title"><h2>Hotel</h2><button class="primary" data-url="${esc(trip.hotel.appUrl)}">Abrir app hotel</button></div><div class="card"><h3>${esc(trip.hotel.name)}</h3><p class="muted">Check-in: ${esc(trip.hotel.checkIn)}<br>Check-out: ${esc(trip.hotel.checkOut)}</p></div>`}
function renderTransfers(){
if((trip.transportType||'aereo').toLowerCase().includes('terr')){
  $('#transfers').innerHTML=`<div class="section-title"><h2>Traslados terrestres</h2></div>
  ${routeMap()}
  ${trip.transfers.map(t=>`<div class="row">
    <div><h3>${esc(t.title)}</h3><p class="muted">${fmt(t.date)} · ${esc(t.time)} · ${esc(t.status)}</p></div>
    <button class="primary" data-url="${esc(t.url)}">Ver ruta</button>
  </div>`).join('')}`;
  setTimeout(initFlightMap,120);
}else{
  $('#transfers').innerHTML=`<div class="section-title"><h2>Traslados</h2></div>
  <div class="notice"><b>Sin traslados terrestres</b><br><span class="muted">Este viaje es principalmente aéreo. Los traslados no aplican o son internos.</span></div>`;
}
}
function renderTours(){$('#tours').innerHTML=`<div class="section-title"><h2>Tours</h2></div>${trip.tours.map(t=>`<div class="row"><div><h3>${esc(t.title)}</h3><p class="muted">${fmt(t.date)} · ${esc(t.time)} · ${esc(t.status)}</p></div><button class="primary" data-url="${esc(t.url)}">Voucher</button></div>`).join('')}`}
const profiles={pareja:['Outfits coordinados para fotos','Conjunto para cena o salida especial','Artículos de higiene compartidos','Mini botiquín común'],familia:['Documentos de menores si aplica','Snacks para trayecto','Entretenimiento para niños','Muda infantil extra en equipaje de mano','Toallitas húmedas'],solo:['Candado para equipaje','Mochila ligera de día','Copia digital en nube','Ubicaciones guardadas offline'],negocios:['Laptop y cargador','Ropa formal','Zapatos formales','Documentos de trabajo','Adaptador HDMI/USB si presentas']},places={playa:['Bloqueador solar FPS 50+','After sun / crema hidratante','Traje de baño','Sandalias','Bolsa impermeable para celular','Repelente'],ciudad:['Calzado cómodo','Mochila/crossbody segura','Power bank','Google Maps offline','Paraguas compacto','Outfit casual versátil'],naturaleza:['Repelente fuerte','Botiquín pequeño','Impermeable compacto','Linterna pequeña','Bolsas impermeables','Calzado con buen agarre']};
function detectPlace(){const d=(trip.destination||'').toLowerCase();if(/canc|playa|cabos|riviera|caribe|puerto|vallarta|acapulco|tulum|isla/.test(d))return'playa';if(/bosque|sierra|montaña|selva|parque|cascada|naturaleza|camp/.test(d))return'naturaleza';return'ciudad'}
function place(){return localStorage.getItem('ct_place')||detectPlace()}function profile(){return localStorage.getItem('ct_profile')||'pareja'}function item(text,note=''){return{text,note}}
function cats(){const d=days(),pl=place(),pr=profile();return[{id:'mano',icon:'🎒',title:'Equipaje de mano',items:[item('Identificación oficial / pasaporte'),item('Boletos, reservaciones y vouchers'),item('Celular, cargador y power bank'),item('Medicamentos personales','Nunca los mandes en maleta documentada'),item('Cambio de ropa ligero','Útil si se retrasa la maleta')]},{id:'docs',icon:'🪪',title:'Documentos sugeridos',items:[item('INE o pasaporte'),item('Reservación del hotel'),item('Voucher de traslado'),item('Seguro de viaje'),...(trip.international?[item('Pasaporte vigente'),item('Visa/permiso si aplica'),item('Datos de embajada o consulado')]:[])]},{id:'ropa',icon:'👕',title:`Ropa para ${d} días`,items:[item(`${d} mudas de ropa interior`),item(`${Math.ceil(d*.8)} playeras/camisas`),item(`${Math.max(2,Math.ceil(d/2))} pantalones/shorts`),item('Outfit extra de emergencia')]},{id:'tipo',icon:'✨',title:`Recomendado: ${pr}`,items:profiles[pr].map(x=>item(x))},{id:'lugar',icon:'📍',title:`Recomendado: ${pl}`,items:places[pl].map(x=>item(x))},{id:'salud',icon:'💊',title:'Salud e higiene',items:[item('Cepillo y pasta dental'),item('Desodorante'),item('Protector solar'),item('Analgésico básico'),item('Gel antibacterial')]}]}
function flat(){return cats().flatMap(c=>c.items.map((it,i)=>({...it,key:`${c.id}-${i}-${it.text}`})))}function getBag(){try{return JSON.parse(localStorage.getItem(bagKey())||'{}')}catch{return{}}}function saveBag(b){localStorage.setItem(bagKey(),JSON.stringify(b))}function updateCount(){const b=getBag(),f=flat(),done=f.filter(i=>b[i.key]).length;const el=$('#bagCounter');if(el)el.textContent=`${done}/${f.length}`}
function renderBag(){const b=getBag(),f=flat(),done=f.filter(i=>b[i.key]).length,pr=profile(),pl=place();$('#bag').innerHTML=`<div class="section-title"><h2>Equipaje inteligente</h2><div class="actions"><button class="secondary" data-action="shareBag">Compartir WhatsApp</button><button class="primary" data-action="bagAll">Todo listo</button><button class="secondary" data-action="bagPending">Solo pendientes</button><button class="secondary" data-action="bagClear">Resetear</button></div></div><div class="bag-layout"><aside class="bag-panel"><div class="bag-help"><strong>Lista recomendada premium</strong><br>Calculada para <strong>${days()} días</strong>, tipo de viaje y tipo de lugar.<br><span class="place-chip">${pl==='playa'?'🏖️':pl==='naturaleza'?'🌲':'🏙️'} ${pl}</span></div><div class="bag-controls"><label><span class="muted">Tipo de viaje</span><select id="bagProfile"><option value="pareja" ${pr==='pareja'?'selected':''}>Pareja</option><option value="familia" ${pr==='familia'?'selected':''}>Familia</option><option value="solo" ${pr==='solo'?'selected':''}>Solo</option><option value="negocios" ${pr==='negocios'?'selected':''}>Negocios</option></select></label><label><span class="muted">Tipo de lugar</span><select id="bagPlace"><option value="playa" ${pl==='playa'?'selected':''}>Playa</option><option value="ciudad" ${pl==='ciudad'?'selected':''}>Ciudad</option><option value="naturaleza" ${pl==='naturaleza'?'selected':''}>Naturaleza</option></select></label><button class="secondary" data-url="${esc(trip.checklistPdfUrl)}">📄 PDF checklist</button><button class="secondary" data-url="${esc(trip.baggagePdfUrl)}">✈️ PDF equipaje</button><button class="secondary" data-url="${esc(trip.packPointIos)}">PackPoint iOS</button><button class="secondary" data-url="${esc(trip.packPointAndroid)}">PackPoint Android</button></div><div class="bag-summary"><div class="bag-stat"><span>Artículos listos</span><strong id="bagCounter">${done}/${f.length}</strong></div><div class="bag-stat"><span>Perfil</span><strong>${pr}</strong></div></div></aside><section><div class="bag-advice"><h3>Consejo</h3><p>${pr==='familia'?'Prioriza prevención: documentos, snacks, entretenimiento y muda rápida.':pr==='negocios'?'Tu equipaje de mano debe permitirte trabajar aunque se retrase la maleta.':pr==='solo'?'Viaja ligero, seguro y con copias digitales.':'Eviten duplicar cargadores e higiene; coordinen outfits útiles.'}</p></div>${cats().map(c=>`<div class="bag-cat"><div class="bag-cat-head"><h3>${c.icon} ${c.title}</h3><span class="bag-chip">${c.items.length} sugerencias</span></div>${c.items.map((it,i)=>{const key=`${c.id}-${i}-${it.text}`;return `<label class="bag-row"><input type="checkbox" data-bag="${esc(key)}" ${b[key]?'checked':''}>${esc(it.text)}${it.note?`<small>${esc(it.note)}</small>`:''}</label>`}).join('')}</div>`).join('')}</section></div>`}
function renderEmergency(){let rows=[['📲','Agente',cfg.agency.phone],['🏨','Hotel',trip.emergency.hotelPhone],['✈️','Aerolínea',trip.emergency.airlinePhone],['🛡️','Seguro de viaje',trip.emergency.insurancePhone]];if(trip.international)rows.push(['🏛️','Embajada / consulado',trip.emergency.embassyPhone]);$('#emergency').innerHTML=`<div class="section-title"><h2>Emergencias</h2></div><div class="notice"><b>En caso de emergencia</b><br><span class="muted">Contacta primero a tu agente o al proveedor correspondiente.</span></div>${rows.map(r=>`<div class="row"><div><h3>${r[0]} ${esc(r[1])}</h3><p class="muted">${esc(r[2])}</p></div>${r[1]==='Agente'?'<button class="primary" data-action="whatsapp">WhatsApp</button>':''}</div>`).join('')}`}
function renderReviews(){$('#reviews').innerHTML=`<div class="section-title"><h2>Reseñas y fotos</h2></div><div class="card"><h3>Califica tu experiencia</h3><div class="stars">${[1,2,3,4,5].map(n=>`<span data-star="${n}" class="${n<=rating?'on':''}">★</span>`).join('')}</div><textarea id="reviewText" placeholder="Escribe tu comentario"></textarea><label class="privacy"><input type="checkbox" id="privacyCheck"><span>Acepto el <a href="${cfg.agency.privacy}" target="_blank">aviso de privacidad</a> para compartir mi reseña y/o fotos.</span></label><div class="actions" style="margin-top:10px"><button class="primary" data-action="sendReview">Enviar reseña WhatsApp</button><button class="secondary" data-url="${cfg.agency.reviewForm}">Abrir Google Forms</button><button class="secondary" data-action="sendPhotos">Subir fotos por WhatsApp</button></div></div><div class="card"><h3>Síguenos</h3><p class="muted">También puedes seguir a Citimar Travel Agency en redes.</p><div class="social-grid"><button class="primary" data-url="${cfg.agency.facebook}">Facebook</button><button class="primary" data-url="https://www.instagram.com/lizette_traveldesignermx">Instagram</button><button class="secondary disabled" data-action="pendingSocial">TikTok</button><button class="primary" data-url="https://wa.me/${cfg.agency.phone}">WhatsApp</button></div></div>`}
function renderAll(){renderHome();renderTimeline();renderDocs();renderFlights();renderHotel();renderTransfers();renderTours();renderBag();renderEmergency();renderReviews();renderNav()}
document.addEventListener('click',e=>{const v=e.target.closest('[data-view]')?.dataset.view;if(v)return go(v);const url=e.target.closest('[data-url]')?.dataset.url;if(url!==undefined)return openUrl(url);const a=e.target.closest('[data-action]')?.dataset.action;if(!a)return;if(a==='theme'){document.body.classList.toggle('dark');localStorage.setItem('ct_theme',document.body.classList.contains('dark')?'dark':'light')}if(a==='menu')$('#sidebar').classList.add('open');if(a==='pendingSocial')toast('Red social pendiente por configurar.');if(a==='whatsapp')wa(`Hola, soy ${trip.clientName}. Necesito apoyo con mi viaje a ${trip.destination}.`);if(a==='offline'){localStorage.setItem('ct_docs',JSON.stringify(trip.documents));toast('Documentos guardados para consulta básica offline.')}if(a==='sendDocs'){wa('Estado de documentos Citimar:\\n'+trip.documents.map(d=>`${d.title}: ${d.status}`).join('\\n'))}if(a==='bagAll'){const b={};flat().forEach(i=>b[i.key]=true);saveBag(b);renderBag();toast('Checklist marcado como listo.')}if(a==='bagPending'){const b=getBag(),p=flat().filter(i=>!b[i.key]);toast(`Pendientes: ${p.length} artículos.`)}if(a==='bagClear'){saveBag({});renderBag();toast('Checklist reiniciado.')}if(a==='shareBag'){const b=getBag(),f=flat(),done=f.filter(i=>b[i.key]),pend=f.filter(i=>!b[i.key]);wa(`Checklist de equipaje ${trip.destination}:\\n\\nListo:\\n${done.map(x=>'✓ '+x.text).join('\\n')||'Sin artículos marcados.'}\\n\\nPendiente:\\n${pend.map(x=>'• '+x.text).join('\\n')||'Nada pendiente.'}`)}if(a==='sendReview'){const check=$('#privacyCheck');if(!check||!check.checked)return toast('Debes aceptar el aviso de privacidad.');const text=$('#reviewText')?.value||'';wa(`Reseña Citimar Travel\\nCalificación: ${rating}/5\\nComentario: ${text}`)}if(a==='sendPhotos'){const check=$('#privacyCheck');if(!check||!check.checked)return toast('Debes aceptar el aviso de privacidad.');wa(`Hola, quiero compartir fotos de mi viaje a ${trip.destination}.`)}})
document.addEventListener('change',e=>{if(e.target.id==='bagProfile'){localStorage.setItem('ct_profile',e.target.value);localStorage.removeItem(bagKey());renderBag()}if(e.target.id==='bagPlace'){localStorage.setItem('ct_place',e.target.value);localStorage.removeItem(bagKey());renderBag()}const cb=e.target.closest('[data-bag]');if(cb){const b=getBag();b[cb.dataset.bag]=cb.checked;saveBag(b);updateCount()}})
document.addEventListener('click',e=>{const s=e.target.closest('[data-star]');if(s){rating=Number(s.dataset.star);localStorage.setItem('ct_rating',rating);renderReviews()}})
if(localStorage.getItem('ct_theme')==='dark')document.body.classList.add('dark');renderAll();
</script>
